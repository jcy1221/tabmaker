<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간편 타브 악보 생성기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
        }

        /* A4 용지 설정 (마진 최적화) */
        .page {
            width: 210mm;
            min-height: 297mm;
            padding: 12mm;
            margin: 10mm auto;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
        }

        /* 인쇄 설정 */
        @media print {
            body { background: none; }
            .no-print { display: none !important; }
            .page {
                margin: 0;
                box-shadow: none;
                width: 100%;
                height: 100%;
                padding: 12mm;
            }
            .row-container:hover .delete-btn { display: none; }
        }

        /* 타브 격자 스타일 */
        .tab-grid {
            display: grid;
            border-left: 1px solid #000;
            width: 100%;
        }

        .tab-cell {
            border-right: 1px solid #ddd;
            border-bottom: 1px solid #000;
            height: 14px; /* 위아래 높이를 16px -> 14px로 더 축소 */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            container-type: inline-size;
        }

        /* 마디 구분선 */
        .measure-border {
            border-right: 2px solid #000 !important;
        }

        .tab-input {
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 11px;
            font-size: clamp(7px, 55cqw, 11px);
            border: none;
            background: transparent;
            outline: none;
            z-index: 10;
            cursor: pointer;
        }

        /* 선택된 셀(복사 범위) 하이라이트 */
        .selected-cell {
            background-color: rgba(59, 130, 246, 0.2) !important;
        }

        /* 숫자가 있을 때 배경 선 가리기 */
        .tab-input:not(:placeholder-shown),
        .tab-input:focus {
            background-color: white;
        }

        .row-container {
            position: relative;
            margin-bottom: 10px; /* 줄 간격을 15px -> 10px로 축소 */
        }

        .delete-btn {
            position: absolute;
            right: -40px;
            top: 25px;
            background: #ff4d4d;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 12px;
        }

        .row-container:hover .delete-btn {
            opacity: 1;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="no-print bg-white border-b p-3 sticky top-0 z-50 shadow-sm">
        <div class="max-w-4xl mx-auto flex flex-wrap items-end gap-4 justify-center">
            <div class="flex flex-col">
                <label class="text-[10px] font-bold text-gray-500 mb-1">현 수</label>
                <select id="stringCount" class="border rounded px-2 py-1 text-sm bg-gray-50 outline-none">
                    <option value="4">4현</option>
                    <option value="5">5현</option>
                    <option value="6" selected>6현</option>
                    <option value="7">7현</option>
                </select>
            </div>
            <div class="flex flex-col w-16">
                <label class="text-[10px] font-bold text-gray-500 mb-1">마디 수</label>
                <input type="number" id="measuresPerLine" value="4" min="1" class="border rounded px-2 py-1 text-sm bg-gray-50 outline-none">
            </div>
            <div class="flex flex-col w-20">
                <label class="text-[10px] font-bold text-gray-500 mb-1">마디당 칸</label>
                <input type="number" id="divisionPerMeasure" value="8" min="1" class="border rounded px-2 py-1 text-sm bg-gray-50 outline-none">
            </div>
            
            <div class="flex gap-2">
                <button onclick="saveScore()" class="bg-green-600 text-white px-3 py-1.5 rounded text-sm font-bold hover:bg-green-700 transition">
                    임시저장
                </button>
                <button onclick="showLoadModal()" class="bg-yellow-500 text-white px-3 py-1.5 rounded text-sm font-bold hover:bg-yellow-600 transition">
                    불러오기
                </button>
                <button onclick="initScore()" class="bg-gray-800 text-white px-3 py-1.5 rounded text-sm font-bold hover:bg-black transition">
                    새로 만들기
                </button>
                <button onclick="handlePrint()" class="bg-blue-600 text-white px-3 py-1.5 rounded text-sm font-bold hover:bg-blue-700 transition">
                    PDF 저장
                </button>
            </div>
        </div>
    </div>

    <div class="page" id="printArea">
        <input type="text" id="songTitle" placeholder="곡 제목을 입력하세요" class="w-full text-center text-3xl font-bold border-none outline-none mb-6 placeholder-gray-200">
        
        <div id="scoreContainer">
            </div>

        <div class="no-print mt-8 flex justify-center pb-10">
            <button onclick="addRow()" class="border-2 border-dashed border-gray-300 text-gray-400 px-10 py-3 rounded-lg hover:border-gray-500 hover:text-gray-600 transition font-bold">
                + 줄 추가하기
            </button>
        </div>
    </div>

    <div id="saveListModal" class="no-print hidden fixed inset-0 bg-black bg-opacity-50 z-[100] flex items-center justify-center">
        <div class="bg-white rounded-lg p-6 w-96 max-w-[90%] shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">저장된 악보 목록</h2>
                <button onclick="closeModal()" class="text-gray-500 hover:text-red-500 text-xl font-bold transition">✕</button>
            </div>
            <ul id="saveList" class="max-h-60 overflow-y-auto border border-gray-200 rounded divide-y divide-gray-100">
            </ul>
        </div>
    </div>

    <script>
        let gridCounter = 0;
        let isSelecting = false;
        let selectionStart = null;
        let selectionEnd = null;
        let selectedGrid = null;

        function initScore() {
            const container = document.getElementById('scoreContainer');
            container.innerHTML = '';
            for(let i=0; i<4; i++) {
                addRow();
            }
        }

        function addRow(savedData = null) {
            const container = document.getElementById('scoreContainer');
            
            const stringCount = savedData ? savedData.stringCount : parseInt(document.getElementById('stringCount').value);
            const measuresPerLine = savedData ? savedData.measuresPerLine : parseInt(document.getElementById('measuresPerLine').value);
            const divisionPerMeasure = savedData ? savedData.divisionPerMeasure : parseInt(document.getElementById('divisionPerMeasure').value);
            const totalCols = measuresPerLine * divisionPerMeasure;

            const rowWrapper = document.createElement('div');
            rowWrapper.className = 'row-container';
            
            const labelInput = document.createElement('input');
            labelInput.type = 'text';
            labelInput.placeholder = '섹션 이름 (예: Verse)';
            labelInput.className = 'section-label w-full text-[10px] font-bold text-black placeholder-gray-300 border-none outline-none mb-1 px-1 uppercase tracking-wider';
            if(savedData && savedData.label) labelInput.value = savedData.label;
            rowWrapper.appendChild(labelInput);

            const delBtn = document.createElement('div');
            delBtn.className = 'delete-btn no-print shadow-md';
            delBtn.innerHTML = '✕';
            delBtn.onclick = () => rowWrapper.remove();
            rowWrapper.appendChild(delBtn);

            const grid = document.createElement('div');
            grid.className = 'tab-grid';
            grid.dataset.stringCount = stringCount;
            grid.dataset.measuresPerLine = measuresPerLine;
            grid.dataset.divisionPerMeasure = divisionPerMeasure;
            grid.dataset.totalCols = totalCols;
            grid.style.gridTemplateColumns = `repeat(${totalCols}, 1fr)`;

            for (let s = 0; s < stringCount; s++) {
                for (let c = 0; c < totalCols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'tab-cell';
                    
                    if ((c + 1) % divisionPerMeasure === 0) {
                        cell.classList.add('measure-border');
                    }

                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'tab-input';
                    input.maxLength = 3;
                    input.dataset.row = s;
                    input.dataset.col = c;
                    
                    if (savedData && savedData.cellMap && savedData.cellMap[`${s}-${c}`]) {
                        input.value = savedData.cellMap[`${s}-${c}`];
                    }
                    
                    input.onkeydown = (e) => handleKeyDown(e, input, s, c, stringCount, totalCols);

                    input.addEventListener('mousedown', (e) => {
                        if (e.button !== 0) return; 
                        isSelecting = true;
                        selectedGrid = grid;
                        selectionStart = {s, c};
                        selectionEnd = {s, c};
                        updateSelection();
                    });

                    input.addEventListener('mouseenter', () => {
                        if (isSelecting && selectedGrid === grid) {
                            selectionEnd = {s, c};
                            updateSelection();
                        }
                    });

                    input.addEventListener('paste', (e) => {
                        e.preventDefault();
                        const text = (e.clipboardData || window.clipboardData).getData('text');
                        const rows = text.split(/\r?\n/);
                        if (rows.length === 0) return;

                        if (rows.length === 1 && rows[0].split('\t').length === 1) {
                            input.value = rows[0].trim().substring(0, 3);
                            return;
                        }

                        const startS = parseInt(input.dataset.row);
                        const startC = parseInt(input.dataset.col);

                        for (let i = 0; i < rows.length; i++) {
                            if (!rows[i] && i === rows.length - 1) continue; 
                            const cols = rows[i].split('\t');
                            for (let j = 0; j < cols.length; j++) {
                                const targetS = startS + i;
                                const targetC = startC + j;
                                const targetInput = grid.querySelector(`input[data-row="${targetS}"][data-col="${targetC}"]`);
                                if (targetInput) {
                                    targetInput.value = cols[j].trim().substring(0, 3);
                                }
                            }
                        }
                    });

                    cell.appendChild(input);
                    grid.appendChild(cell);
                }
            }

            rowWrapper.appendChild(grid);
            container.appendChild(rowWrapper);
        }

        function updateSelection() {
            if (!selectedGrid) return;
            selectedGrid.querySelectorAll('.selected-cell').forEach(el => el.classList.remove('selected-cell'));

            if (!selectionStart || !selectionEnd) return;
            if (selectionStart.s === selectionEnd.s && selectionStart.c === selectionEnd.c) return;

            const minS = Math.min(selectionStart.s, selectionEnd.s);
            const maxS = Math.max(selectionStart.s, selectionEnd.s);
            const minC = Math.min(selectionStart.c, selectionEnd.c);
            const maxC = Math.max(selectionStart.c, selectionEnd.c);

            for (let s = minS; s <= maxS; s++) {
                for (let c = minC; c <= maxC; c++) {
                    const cellInput = selectedGrid.querySelector(`input[data-row="${s}"][data-col="${c}"]`);
                    if (cellInput) cellInput.classList.add('selected-cell');
                }
            }
        }

        document.addEventListener('mouseup', () => {
            isSelecting = false;
        });

        document.addEventListener('mousedown', (e) => {
            if (!e.target.classList.contains('tab-input')) {
                document.querySelectorAll('.selected-cell').forEach(el => el.classList.remove('selected-cell'));
                selectionStart = null;
                selectionEnd = null;
            }
        });

        document.addEventListener('copy', (e) => {
            if (!selectionStart || !selectionEnd || !selectedGrid) return;
            
            const minS = Math.min(selectionStart.s, selectionEnd.s);
            const maxS = Math.max(selectionStart.s, selectionEnd.s);
            const minC = Math.min(selectionStart.c, selectionEnd.c);
            const maxC = Math.max(selectionStart.c, selectionEnd.c);

            if (minS === maxS && minC === maxC) return;

            e.preventDefault();
            let clipboardText = '';
            for (let s = minS; s <= maxS; s++) {
                let rowText = [];
                for (let c = minC; c <= maxC; c++) {
                    const cellInput = selectedGrid.querySelector(`input[data-row="${s}"][data-col="${c}"]`);
                    rowText.push(cellInput ? cellInput.value : '');
                }
                clipboardText += rowText.join('\t') + '\n';
            }
            e.clipboardData.setData('text/plain', clipboardText);
            
            document.querySelectorAll('.selected-cell').forEach(el => el.classList.remove('selected-cell'));
        });

        function saveScore() {
            let title = document.getElementById('songTitle').value.trim();
            
            if (!title) {
                title = prompt("곡 제목이 비어있네요! 저장할 이름을 입력해주세요:", "새 악보");
                if (!title) return;
                document.getElementById('songTitle').value = title;
            }

            const data = {
                title: title,
                stringCount: document.getElementById('stringCount').value,
                measuresPerLine: document.getElementById('measuresPerLine').value,
                divisionPerMeasure: document.getElementById('divisionPerMeasure').value,
                rows: []
            };

            document.querySelectorAll('.row-container').forEach(row => {
                const label = row.querySelector('.section-label').value;
                const grid = row.querySelector('.tab-grid');
                const cellMap = {};
                
                grid.querySelectorAll('.tab-input').forEach(input => {
                    if (input.value) {
                        cellMap[`${input.dataset.row}-${input.dataset.col}`] = input.value;
                    }
                });

                data.rows.push({
                    label,
                    stringCount: parseInt(grid.dataset.stringCount),
                    measuresPerLine: parseInt(grid.dataset.measuresPerLine),
                    divisionPerMeasure: parseInt(grid.dataset.divisionPerMeasure),
                    cellMap
                });
            });

            let saves = JSON.parse(localStorage.getItem('tabScoreSaves') || '{}');
            saves[title] = data;

            localStorage.setItem('tabScoreSaves', JSON.stringify(saves));
            alert(`'${title}' 악보가 기기에 안전하게 저장되었어요! 💾`);
        }

        function showLoadModal() {
            const saves = JSON.parse(localStorage.getItem('tabScoreSaves') || '{}');
            const saveTitles = Object.keys(saves);

            if (saveTitles.length === 0) {
                alert('앗, 아직 저장된 악보가 없어요! 😅');
                return;
            }

            const listEl = document.getElementById('saveList');
            listEl.innerHTML = '';

            saveTitles.forEach(title => {
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center p-3 hover:bg-gray-50';
                
                const titleSpan = document.createElement('span');
                titleSpan.className = 'font-semibold text-sm truncate w-48 text-gray-700';
                titleSpan.textContent = title;

                const btnGroup = document.createElement('div');
                btnGroup.className = 'flex gap-2';

                const loadBtn = document.createElement('button');
                loadBtn.className = 'bg-blue-500 text-white px-3 py-1 rounded text-xs font-bold hover:bg-blue-600 transition';
                loadBtn.textContent = '열기';
                loadBtn.onclick = () => loadSpecificScore(title, saves[title]);

                const delBtn = document.createElement('button');
                delBtn.className = 'bg-red-500 text-white px-3 py-1 rounded text-xs font-bold hover:bg-red-600 transition';
                delBtn.textContent = '삭제';
                delBtn.onclick = () => deleteScore(title);

                btnGroup.appendChild(loadBtn);
                btnGroup.appendChild(delBtn);
                li.appendChild(titleSpan);
                li.appendChild(btnGroup);
                listEl.appendChild(li);
            });

            document.getElementById('saveListModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('saveListModal').classList.add('hidden');
        }

        function loadSpecificScore(title, data) {
            try {
                document.getElementById('songTitle').value = data.title || title;
                document.getElementById('stringCount').value = data.stringCount || '6';
                document.getElementById('measuresPerLine').value = data.measuresPerLine || '4';
                document.getElementById('divisionPerMeasure').value = data.divisionPerMeasure || '8';

                const container = document.getElementById('scoreContainer');
                container.innerHTML = '';
                
                data.rows.forEach(rowData => {
                    addRow(rowData);
                });
                closeModal();
            } catch(e) {
                alert('데이터를 불러오는 중 오류가 발생했어요. 😢');
            }
        }

        function deleteScore(title) {
            if (confirm(`정말 '${title}' 악보를 지울까요? 복구할 수 없어요! 🚨`)) {
                let saves = JSON.parse(localStorage.getItem('tabScoreSaves') || '{}');
                delete saves[title];
                localStorage.setItem('tabScoreSaves', JSON.stringify(saves));
                
                if (Object.keys(saves).length === 0) {
                    closeModal();
                    alert('모든 저장된 악보가 삭제되었습니다.');
                } else {
                    showLoadModal();
                }
            }
        }

        function handleKeyDown(e, input, s, c, maxS, maxC) {
            let nextInput;
            const currentGrid = input.closest('.tab-grid');
            
            if (e.key === 'ArrowRight') {
                if (c < maxC - 1) {
                    nextInput = currentGrid.children[s * maxC + (c + 1)].querySelector('input');
                }
            } else if (e.key === 'ArrowLeft') {
                if (c > 0) {
                    nextInput = currentGrid.children[s * maxC + (c - 1)].querySelector('input');
                }
            } else if (e.key === 'ArrowDown') {
                if (s < maxS - 1) {
                    nextInput = currentGrid.children[(s + 1) * maxC + c].querySelector('input');
                }
            } else if (e.key === 'ArrowUp') {
                if (s > 0) {
                    nextInput = currentGrid.children[(s - 1) * maxC + c].querySelector('input');
                }
            }

            if (nextInput) {
                e.preventDefault();
                nextInput.focus();
            }
        }

        function handlePrint() {
            setTimeout(() => {
                window.print();
            }, 100);
        }

        window.onload = initScore;
    </script>
</body>
</html>
